services:
  zebra-label-gateway:
    build: .
    image: zebra-label-gateway:latest
    container_name: zebra-label-gateway
    ports:
      # Direct HTTP access (optional once Caddy/TLS is in front). Some Windows
      # hosts reserve 8000 (Hyper-V range) — override with ZLG_HOST_PORT.
      - "${ZLG_HOST_PORT:-8000}:8000"
    environment:
      # Point this at your printer's IP. Port defaults to 9100.
      ZLG_PRINTER_HOST: "${ZLG_PRINTER_HOST:-10.10.100.107}"
      ZLG_PRINTER_PORT: "${ZLG_PRINTER_PORT:-9100}"
    volumes:
      # Persist saved-label history and trained crop profiles.
      - zlg-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/profiles',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 5s

  # HTTPS for the LAN (required for iOS PWA install + service workers).
  # Enable with:  docker compose --profile tls up -d --build
  caddy:
    image: caddy:2
    container_name: zlg-caddy
    profiles: ["tls"]
    depends_on:
      - zebra-label-gateway
    ports:
      - "443:443"
      - "80:80"
    environment:
      ZLG_HOSTNAME: "${ZLG_HOSTNAME:-gateway.local}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  # HTTPS over Tailscale (public-valid certs, no CA to trust). Alternative to
  # the caddy service above — for a Linux host already on a tailnet.
  # Enable with:  docker compose --profile tailscale up -d --build
  tailscale:
    image: tailscale/tailscale:latest
    container_name: zlg-tailscale
    profiles: ["tailscale"]
    hostname: "${ZLG_TS_HOSTNAME:-label-gateway}"   # -> https://<this>.<tailnet>.ts.net
    depends_on:
      - zebra-label-gateway
    environment:
      TS_AUTHKEY: "${TS_AUTHKEY:-}"                  # from the Tailscale admin console
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json           # proxies :443 -> the gateway
      TS_USERSPACE: "true"                           # no NET_ADMIN / host caps needed
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./deploy/tailscale-serve.json:/config/serve.json:ro
    restart: unless-stopped

volumes:
  zlg-data:
  caddy-data:
  caddy-config:
  tailscale-state:
